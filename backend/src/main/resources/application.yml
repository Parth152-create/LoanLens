spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/loanlens
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8081

ml:
  service:
    url: http://localhost:8000
management:
  endpoints:
    web:
      exposure:
        include: health,info
